<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veroushka Ramjiawan</title>
  <link rel="icon" type="image/x-icon" href="./img/favicon.png">
  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>

  <header class="nav">
    <a href="./index.html" class="nav__logo">VR</a>

    <ul class="nav__links">
      <li>
        <a href="./index.html" class="nav__link active">
          <img
            src="./img/assets/home-page-icon.png"
            alt=""
            class="nav__icon nav__icon--home"
            aria-hidden="true"
          />
          Home
        </a>
      </li>
      <li>
        <a href="./about.html" class="nav__link">
          <img
            src="./img/assets/about-me-icon.png"
            alt=""
            class="nav__icon nav__icon--about"
            aria-hidden="true"
          />
          About
        </a>
      </li>
      <li>
        <a href="./work.html" class="nav__link">
          <img
            src="./img/assets/work-icon.png"
            alt=""
            class="nav__icon nav__icon--work"
            aria-hidden="true"
          />
          Work
        </a>
      </li>
      <li>
        <a href="./contact.html" class="nav__link">
          <img
            src="./img/assets/contact.png"
            alt=""
            class="nav__icon nav__icon--contact"
            aria-hidden="true"
          />
          Contact
        </a>
      </li>
    </ul>

    <!-- Hamburger button (mobile only) -->
    <button class="nav__burger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <main>
    <section class="hero" id="hero">

      <video
        class="hero__video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true">
        <source src="./img/assets/hero-video.mp4" type="video/mp4" />
      </video>

      <div class="hero__overlay" aria-hidden="true"></div>

      <div class="hero__content">
        <h1 class="hero__name">Veroushka Ramjiawan</h1>
        <p class="hero__tagline">Student</p>
      </div>

    </section>

    <section class="about-strip">

    <div class="about-strip__notebook">
      <img src="./img/assets/homepage2.png" alt="Open notebook" />

      <div class="about-strip__photo-wrap">
        <img src="./img/assets/tape1.png" alt="" class="about-strip__tape about-strip__tape--1" aria-hidden="true" />
        <img src="./img/assets/tape2.png" alt="" class="about-strip__tape about-strip__tape--2" aria-hidden="true" />
        <img src="./img/assets/Sara.jpeg" alt="Sketch of Veroushka" class="about-strip__photo" />
      </div>

    </div>

      <div class="about-strip__right">

        <img
          src="./img/assets/hert-icon-origami.png"
          alt="Origami heart"
          class="about-strip__heart"
        />

        <div class="about-strip__sticky-wrap">
          <img
            src="./img/assets/sticky-note.png"
            alt=""
            class="about-strip__sticky-bg"
            aria-hidden="true"
          />
          <p class="about-strip__sticky-text">
            I'm Veroushka Ramjiawan,<br />
            an IT student at UNASAT<br />
            surviving the grind<br />
            one assignment at a time.
          </p>

      </div>

    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
