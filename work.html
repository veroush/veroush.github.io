<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Work and projects by Veroushka Ramjiawan — web development portfolio." />
  <title>Work — Veroushka Ramjiawan</title>
  <link rel="icon" type="image/x-icon" href="./img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Inter:wght@400;500;600&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/work.css" />
</head>
<body class="work-page">

  <!-- ── NAVIGATION ── -->
  <nav class="nav" aria-label="Main navigation">
    <a href="./index.html" class="nav__logo" aria-label="Veroushka Ramjiawan — Home">VR</a>
    <ul class="nav__links" role="list">
      <li><a href="./index.html"   class="nav__link">Home</a></li>
      <li><a href="./about.html"   class="nav__link">About</a></li>
      <li><a href="./work.html"    class="nav__link active">Work</a></li>
      <li><a href="./contact.html" class="nav__link">Contact</a></li>
    </ul>
    <button class="nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav__overlay" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <ul role="list">
      <li><a href="./index.html"   class="nav__link">Home</a></li>
      <li><a href="./about.html"   class="nav__link">About</a></li>
      <li><a href="./work.html"    class="nav__link active">Work</a></li>
      <li><a href="./contact.html" class="nav__link">Contact</a></li>
    </ul>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       STATION — full viewport environment
  ══════════════════════════════════════════════════════════ -->
  <main class="station" id="station" aria-label="Project showcase — subway station">

    <!-- ── LAYER 1: SUBWAY WALL (furthest back) ── -->
    <div class="env-layer env-layer--wall" aria-hidden="true">
      <img
        src="./img/assets/backgrounds/subway-wall.webp"
        alt=""
        class="env-img"
        draggable="false"
      />
      <!-- Graffiti SVG painted on the wall -->
      <svg
        class="graffiti-svg"
        viewBox="0 0 1400 480"
        preserveAspectRatio="xMidYMid slice"
        aria-hidden="true"
      >
        <!-- Left column — stacked slogans -->
        <text x="52"  y="210" class="g-tag g-tag--xl  g-pink">FOCUS</text>
        <text x="48"  y="278" class="g-tag g-tag--xl  g-pink">BUILD</text>
        <text x="42"  y="346" class="g-tag g-tag--xl  g-pink">CREATE</text>

        <!-- Centre top — faded system tags -->
        <text x="620" y="72"  class="g-tag g-tag--sm  g-dim">NULL</text>
        <text x="690" y="58"  class="g-tag g-tag--sm  g-dim">ACCESS</text>
        <text x="820" y="76"  class="g-tag g-tag--sm  g-dim">404</text>
        <text x="900" y="60"  class="g-tag g-tag--sm  g-dim">SYSTEM</text>
        <text x="980" y="78"  class="g-tag g-tag--sm  g-dim">ROOT</text>

        <!-- Large outline signature across mid-wall -->
        <text x="195" y="400" class="g-tag g-tag--xxl g-outline">VEROUSHKA</text>

        <!-- Right cluster -->
        <text x="870" y="390" class="g-tag g-tag--lg  g-orange">
          404<tspan class="g-tag--sm"> NOT FOUND</tspan>
        </text>
        <text x="1050" y="380" class="g-tag g-tag--md  g-green-bright">
          SYSTEM<tspan x="1050" dy="38">ONLINE</tspan>
        </text>

        <!-- Top-right VR tag -->
        <text x="1250" y="280" class="g-tag g-tag--xxl g-green">VR</text>

        <!-- Pipe / bracket structure lines -->
        <line x1="0"    y1="100" x2="185"  y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="4"/>
        <line x1="1215" y1="100" x2="1400" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="4"/>
        <rect x="158" y="82" width="30" height="38" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" rx="2"/>
        <rect x="1210" y="82" width="30" height="38" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" rx="2"/>
      </svg>

      <!-- Neon strip lights bolted to the wall -->
      <div class="neon-strip neon-strip--left"  aria-hidden="true"></div>
      <div class="neon-strip neon-strip--right" aria-hidden="true"></div>

      <!-- Paint drips -->
      <div class="drip" style="left:8.2%; height:44px; background:#FF1F9A; top:62%"></div>
      <div class="drip" style="left:9.8%; height:26px; background:#FF1F9A; top:74%; opacity:0.1"></div>
      <div class="drip" style="left:88%;  height:32px; background:#4aff8c; top:56%; opacity:0.12"></div>
    </div>

    <!-- ── LAYER 2: PLATFORM ── -->
    <div class="env-layer env-layer--platform" aria-hidden="true">
      <img
        src="./img/assets/backgrounds/platform.webp"
        alt=""
        class="env-img"
        draggable="false"
      />
    </div>

    <!-- ── LAYER 3: TRACKS ── -->
    <div class="env-layer env-layer--tracks" aria-hidden="true">
      <img
        src="./img/assets/backgrounds/tracks.webp"
        alt=""
        class="env-img"
        draggable="false"
      />
    </div>

    <!-- ── LAYER 4: FOREGROUND (closest — vignette / frame) ── -->
    <div class="env-layer env-layer--foreground" aria-hidden="true">
      <img
        src="./img/assets/backgrounds/foreground.webp"
        alt=""
        class="env-img"
        draggable="false"
      />
      <!-- CSS foreground vignette on top of the image -->
      <div class="foreground-vignette"></div>
    </div>

    <!-- ── AMBIENT ATMOSPHERE (CSS-only overlays, no asset) ── -->
    <div class="env-atmosphere" aria-hidden="true">
      <!-- Overhead light cone casting down from ceiling -->
      <div class="light-cone light-cone--left"></div>
      <div class="light-cone light-cone--right"></div>
      <!-- Dust / grain texture overlay -->
      <div class="grain-overlay"></div>
    </div>

    <!-- ── PLATFORM EDGE + FLOOR (sits above track layer) ── -->
    <div class="platform-floor" aria-hidden="true">
      <div class="platform-edge"></div>
      <div class="platform-surface">
        <!-- Dashed safety line -->
        <div class="safety-line"></div>
        <!-- Puddle reflections -->
        <div class="puddle puddle--1"></div>
        <div class="puddle puddle--2"></div>
        <div class="puddle puddle--3"></div>
      </div>
    </div>

    <!-- ── HUD OVERLAY ── -->
    <div class="hud" aria-label="Station HUD">

      <!-- Terminal log — top left -->
      <aside class="hud-terminal" aria-live="polite" aria-label="System terminal">
        <div class="hud-terminal__bar">VR.EXE ACTIVE</div>
        <div class="hud-terminal__body">
          <p class="tl">&gt; SCANNING PLATFORM...</p>
          <p class="tl">&gt; LOADING PROJECT DATABASE...</p>
          <p class="tl tl--ok">&gt; SYSTEM READY.</p>
          <p class="tl tl--ok">&gt; AWAITING ARRIVAL...</p>
          <p class="tl tl--cursor">_</p>
        </div>
      </aside>

      <!-- Arrival board — top centre -->
      <div class="hud-board" aria-live="polite" aria-label="Train arrival information">
        <div class="hud-board__row hud-board__row--now">
          <span class="board-label">NOW ARRIVING</span>
          <span class="board-name" id="ab-now">——</span>
        </div>
        <div class="hud-board__divider"></div>
        <div class="hud-board__row hud-board__row--next">
          <span class="board-label">NEXT TRAIN</span>
          <span class="board-next" id="ab-next">——</span>
          <span class="board-eta"  id="ab-eta">ETA: —:——</span>
        </div>
      </div>

      <!-- Keyboard hint — top right -->
      <div class="hud-hint" aria-label="Navigation controls">
        <div class="hint-row">
          <kbd class="hint-key">↑↓</kbd>
          <span class="hint-desc">NAVIGATE<br><span class="hint-sub">NEXT TRAIN</span></span>
        </div>
        <div class="hint-row">
          <kbd class="hint-key">↵</kbd>
          <span class="hint-desc">SELECT<br><span class="hint-sub">OPEN GITHUB</span></span>
        </div>
      </div>

    </div><!-- /.hud -->

    <!-- ── EMPTY CONTAINERS for Milestones 2–4 ── -->
    <!-- Train will be assembled here in Milestone 2 -->
    <div class="train-container" id="train-container" aria-label="Train display area"></div>

    <!-- Project UI will be injected here in Milestone 3 -->
    <div class="ui-container"    id="ui-container"    aria-hidden="true"></div>

    <!-- Post-processing / particle effects go here in Milestone 4 -->
    <div class="fx-container"    id="fx-container"    aria-hidden="true"></div>

    <!-- Dot navigation (right edge) — wired up in Milestone 4 -->
    <nav class="dot-nav" id="dot-nav" aria-label="Project navigation" aria-hidden="true"></nav>

    <!-- Mobile nav arrows — wired in Milestone 4 -->
    <div class="mobile-nav" id="mobile-nav" aria-hidden="true">
      <button class="mnav-btn" id="mn-prev" aria-label="Previous project" disabled>↑</button>
      <button class="mnav-btn" id="mn-next" aria-label="Next project"     disabled>↓</button>
    </div>

  </main><!-- /.station -->

  <!-- Page transition overlay (from main.js) -->
  <div class="page-transition-overlay" id="page-transition-overlay" aria-hidden="true"></div>

  <script type="module" src="./js/main.js"></script>
  <script src="./js/work.js"></script>
</body>
</html>
