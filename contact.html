  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/contact.css" />
</head>
<body>

  <header class="nav">
    <img src="./img/topnavbar.webp" alt="" class="nav__bg" aria-hidden="true" />
        <div class="nav__content">
          <img src="./img/logo.png" alt="Veroushka Ramjiawan logo" class="nav__logo-img" />
          <ul class="nav__links">
      <li>
        <a href="./index.html" class="nav__link">
          <img
            src="./img/home-page-icon.png"
            alt=""
            class="nav__icon nav__icon--home"
            aria-hidden="true"
          />
          Home
        </a>
      </li>
      <li>
        <a href="./about.html" class="nav__link">
          <img
            src="./img/about-me-icon.png"
            alt=""
            class="nav__icon nav__icon--about"
            aria-hidden="true"
          />
          About
        </a>
      </li>
      <li>
        <a href="./work.html" class="nav__link">
          <img
            src="./img/work-icon.png"
            alt=""
            class="nav__icon nav__icon--work"
            aria-hidden="true"
          />
          Work

      </li>
      <li>
        <a href="./contact.html" class="nav__link active">
          <img
            src="./img/contact.png"
            alt=""
            class="nav__icon nav__icon--contact"
            aria-hidden="true"
          />
          Contact
        </a>
      </li>
    </ul>

    <!-- Hamburger button (mobile only) -->
    <button class="nav__burger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  </header>

    <main>
      <section class="contact-hero">
        <h2 class="contact-hero__title">Let's get in touch!</h2>
      </section>

      <section class="contact-form-section">

        <div class="contact-icons">
          <a href="mailto:ramjiawanveroushka95@gmail.com" class="contact-icons__item contact-icons__item--mail" aria-label="Email">
            <img src="./img/contactpage/mail-icon.png" alt="" class="contact-icons__icon contact-icons__icon--mail" aria-hidden="true" />
            <span class="contact-icons__label">ramjiawanveroushka95@gmail.com</span>
          </a>
          <a href="tel:+5977462470" class="contact-icons__item contact-icons__item--phone" aria-label="Phone">
            <img src="./img/contactpage/phone-icon.png" alt="" class="contact-icons__icon contact-icons__icon--phone" aria-hidden="true" />
            <span class="contact-icons__label">+597 746 2470</span>
          </a>
          <a href="https://www.linkedin.com/in/veroushka-ramjiawan-636114392/" target="_blank" rel="noopener noreferrer" class="contact-icons__item contact-icons__item--linkedin" aria-label="LinkedIn">
            <img src="./img/linkedin-icon.png" alt="" class="contact-icons__icon contact-icons__icon--linkedin" aria-hidden="true" />
            <span class="contact-icons__label">veroushka-ramjiawan-636114392</span>
          </a>
          <a href="https://github.com/Veroush" target="_blank" rel="noopener noreferrer" class="contact-icons__item contact-icons__item--github" aria-label="GitHub">
            <img src="./img/origami-github.png" alt="" class="contact-icons__icon contact-icons__icon--github" aria-hidden="true" />
            <span class="contact-icons__label">https://github.com/Veroush</span>
          </a>
        </div>

        <div class="contact-card">
          <img src="./img/contactpage/contact-card.png" alt="Postcard letter" class="contact-card__bg" />

          <form class="contact-card__form">
            <div class="contact-card__field contact-card__field--from">
              <label for="from-name">From:</label>
              <input type="text" id="from-name" name="from" placeholder="Your name" />
            </div>

            <div class="contact-card__field contact-card__field--to">
              <label for="to-email">To:</label>
              <input type="text" id="to-email" name="to" value="ramjiawanveroushka95@gmail.com" readonly />
            </div>

            <div class="contact-card__field contact-card__field--message">
              <label for="message">Message:</label>
              <div class="contact-card__message-wrap">
                <textarea id="message" name="message" placeholder="Type your message..."></textarea>
                <span class="contact-card__fake-caret" id="fake-caret" aria-hidden="true"></span>
              </div>
            </div>
          </form>
          <div class="contact-card__submit" id="submit-arrow">
            <span class="contact-card__submit-label">Click on the arrow when you're done typing</span>
            <button type="button" class="contact-card__submit-btn" id="submit-btn" aria-label="Send message">
              <img src="./img/contactpage/green-arrow.png" alt="" class="contact-card__submit-arrow-img" />
            </button>
          </div>
        </div>
      
        <div class="contact-card__sent" id="sent-confirmation">
          <p class="contact-card__sent-text" id="sent-text"></p>
          <img src="./img/contactpage/message-sent-envelope.png" alt="Message sent" class="contact-card__sent-img" />
        </div>
      </section>

      <section class="contact-thankyou">
        <img src="./img/contactpage/thankyou.png" alt="Thank you for reaching out" class="contact-thankyou__img" />
      </section>
      <div class="contact-typewriter">
        <div class="contact-typewriter__intro">
          <img src="./img/contactpage/flork-music.webp" alt="" class="contact-typewriter__flork" aria-hidden="true" />
          <span class="contact-typewriter__text">While you await my response, please listen to the famous Typewriter Song!</span>
          <img src="./img/aboutpage/arrow6.png" alt="" class="contact-typewriter__arrow" aria-hidden="true" />
        </div>
        <img src="./img/contactpage/typewriter.png" alt="Click to play The Typewriter by Leroy Anderson" class="contact-typewriter__img" id="typewriter-img" />
        <audio id="typewriter-audio" src="./img/contactpage/the-typewriter-by-leroy-anderson.mp3" preload="none"></audio>
      </div>
    </main>

  <footer class="footer">
    <img src="./img/footer.png" alt="" class="footer__bg" aria-hidden="true" />
    <img src="./img/cat-playing-animation.svg" alt="" class="footer__cat" aria-hidden="true" />

    <div class="footer__content">
      <a href="https://github.com/Veroush" target="_blank" rel="noopener noreferrer" class="footer__link">
        <img src="./img/origami-github.png" alt="GitHub" class="footer__icon footer__icon--github" />
      </a>
      <a href="https://www.linkedin.com/in/veroushka-ramjiawan-636114392/" target="_blank" rel="noopener noreferrer" class="footer__link">
        <img src="./img/linkedin-icon.png" alt="LinkedIn" class="footer__icon footer__icon--linkedin" />
      </a>
    </div>
  </footer>

  <script src="./js/main.js"></script>
  <script src="./js/contact.js"></script>
</body>
</html>
