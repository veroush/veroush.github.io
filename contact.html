<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/contact.css" />
</head>
<body>

  <header class="nav">
    <img src="./img/topnavbar.webp" alt="" class="nav__bg" aria-hidden="true" />
        <div class="nav__content">
          <img src="./img/logo.png" alt="Veroushka Ramjiawan logo" class="nav__logo-img" />
          <ul class="nav__links">
      <li>
        <a href="./index.html" class="nav__link">
          <img
            src="./img/home-page-icon.png"
            alt=""
            class="nav__icon nav__icon--home"
            aria-hidden="true"
          />
          Home
        </a>
      </li>
      <li>
        <a href="./about.html" class="nav__link">
          <img
            src="./img/about-me-icon.png"
            alt=""
            class="nav__icon nav__icon--about"
            aria-hidden="true"
          />
          About
        </a>
      </li>
      <li>
        <a href="./work.html" class="nav__link">
          <img
            src="./img/work-icon.png"
            alt=""
            class="nav__icon nav__icon--work"
            aria-hidden="true"
          />
          Work
        </a>
      </li>
      <li>
        <a href="./contact.html" class="nav__link active">
          <img
            src="./img/contact.png"
            alt=""
            class="nav__icon nav__icon--contact"
            aria-hidden="true"
          />
          Contact
        </a>
      </li>
    </ul>

    <!-- Hamburger button (mobile only) -->
    <button class="nav__burger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  </header>

    <main>
      <section class="contact-hero">
        <h2 class="contact-hero__title">Let's get in touch!</h2>
      </section>

      <section class="contact-form-section">

        <div class="contact-icons">
          <a href="mailto:ramjiawanveroushka95@gmail.com" class="contact-icons__link" aria-label="Email">
            <img src="./img/contactpage/mail-icon.png" alt="" class="contact-icons__icon contact-icons__icon--mail" aria-hidden="true" />
          </a>
          <a href="tel:+5977462470" class="contact-icons__link" aria-label="Phone">
            <img src="./img/contactpage/phone-icon.png" alt="" class="contact-icons__icon contact-icons__icon--phone" aria-hidden="true" />
          </a>
          <a href="https://www.linkedin.com/in/veroushka-ramjiawan-636114392/" target="_blank" rel="noopener noreferrer" class="contact-icons__link" aria-label="LinkedIn">
            <img src="./img/linkedin-icon.png" alt="" class="contact-icons__icon contact-icons__icon--linkedin" aria-hidden="true" />
          </a>
          <a href="https://github.com/Veroush" target="_blank" rel="noopener noreferrer" class="contact-icons__link" aria-label="GitHub">
            <img src="./img/origami_github.png" alt="" class="contact-icons__icon contact-icons__icon--github" aria-hidden="true" />
          </a>
        </div>

        <div class="contact-card">
          <img src="./img/contactpage/contact-card.png" alt="Postcard letter" class="contact-card__bg" />

          <form class="contact-card__form">
            <div class="contact-card__field contact-card__field--from">
              <label for="from-name">From:</label>
              <input type="text" id="from-name" name="from" placeholder="Your name" />
            </div>

            <div class="contact-card__field contact-card__field--to">
              <label for="to-email">To:</label>
              <input type="text" id="to-email" name="to" value="ramjiawanveroushka95@gmail.com" readonly />
            </div>

            <div class="contact-card__field contact-card__field--message">
              <label for="message">Message:</label>
              <div class="contact-card__message-wrap">
                <textarea id="message" name="message" placeholder="Type your message..."></textarea>
                <span class="contact-card__fake-caret" id="fake-caret" aria-hidden="true"></span>
              </div>
            </div>
          </form>
        </div>

      </section>

      <section class="contact-thankyou">
        <img src="./img/contactpage/thankyou.png" alt="Thank you for reaching out" class="contact-thankyou__img" />
      </section>
    </main>

  <footer class="footer">
    <img src="./img/footer.png" alt="" class="footer__bg" aria-hidden="true" />

    <div class="footer__content">
      <a href="https://github.com/Veroush" target="_blank" rel="noopener noreferrer" class="footer__link">
        <img src="./img/origami_github.png" alt="GitHub" class="footer__icon footer__icon--github" />
      </a>
      <a href="https://www.linkedin.com/in/veroushka-ramjiawan-636114392/" target="_blank" rel="noopener noreferrer" class="footer__link">
        <img src="./img/linkedin-icon.png" alt="LinkedIn" class="footer__icon footer__icon--linkedin" />
      </a>
    </div>
  </footer>

  <script src="./js/main.js"></script>
  <script src="./js/contact.js"></script>
</body>
</html>
